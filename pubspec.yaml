name: sneakers_app
description: SneakFreaks - AI-powered premium multi-brand sneaker store.

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.2
  font_awesome_flutter: ^11.0.0
  custom_navigation_bar: ^0.8.2
  simple_animations: ^5.3.0

  flutter_riverpod: ^3.3.2
  intl: ^0.20.3
  shared_preferences: ^2.5.5
  smooth_page_indicator: ^2.0.1
  go_router: ^17.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Variable.ttf
    - family: Archivo
      fonts:
        - asset: assets/fonts/Archivo-Variable.ttf
